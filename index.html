<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Database Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">VAPOR</div>

      <nav>
        <div class="menu-section">
          <a href="#" class="main-link">PC</a>
        </div>

        <div class="menu-section">
          <h3>PlayStation</h3>
          <ul>
            <li><a href="#">PlayStation 1</a></li>
            <li><a href="#">PlayStation 2</a></li>
            <li><a href="#">PlayStation 3</a></li>
            <li><a href="#">PlayStation 4</a></li>
            <li><a href="#">PlayStation 5</a></li>
          </ul>
        </div>

        <div class="menu-section">
          <h3>Nintendo</h3>
          <ul>
            <li><a href="#">Switch</a></li>
            <li><a href="#">Wii / Wii U</a></li>
            <li><a href="#">Nintendo 3DS</a></li>
            <li><a href="#">GameCube</a></li>
            <li><a href="#">Retro (N64/SNES)</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <h1>Sample Text</h1>
      </header>

      <section class="game-grid">
        <!-- Ejemplo de Tarjetas de Juegos estilo RAWG -->
        <div class="game-card">
          <div
            class="card-img"
            style="background-image: url(&quot;https://placeholder.com&quot;)"
          ></div>
          <div class="card-info">
            <span class="platform-tag">PC</span>
            <h3>Ejemplo de Juego 1</h3>
          </div>
        </div>
        <div class="game-card">
          <div
            class="card-img"
            style="background-image: url(&quot;https://placeholder.com&quot;)"
          ></div>
          <div class="card-info">
            <span class="platform-tag">PS5</span>
            <h3>Ejemplo de Juego 2</h3>
          </div>
        </div>
        <div class="game-card">
          <div
            class="card-img"
            style="background-image: url(&quot;https://placeholder.com&quot;)"
          ></div>
          <div class="card-info">
            <span class="platform-tag">Switch</span>
            <h3>Ejemplo de Juego 3</h3>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
